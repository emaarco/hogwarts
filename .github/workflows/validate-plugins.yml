name: Validate Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure jq is available
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          jq --version

      - name: Validate marketplace JSON
        run: jq empty .claude-plugin/marketplace.json

      - name: Check marketplace plugin sources resolve
        run: |
          for src in $(jq -r '.plugins[].source' .claude-plugin/marketplace.json); do
            test -d "$src" || (echo "marketplace.json source not found: $src" && exit 1)
            test -f "$src/.claude-plugin/plugin.json" || (echo "$src missing plugin.json" && exit 1)
            echo "$src: source OK"
          done

  validate-agento-patronum:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/agento-patronum
    steps:
      - uses: actions/checkout@v6

      - name: Ensure jq is available
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Validate JSON files
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty hooks/hooks.json
          jq empty defaults/patronum.json

      - name: Check default patterns
        run: |
          COUNT=$(jq '.entries | length' defaults/patronum.json)
          echo "Default patterns: $COUNT"
          [ "$COUNT" -gt 0 ] || (echo "No default patterns found" && exit 1)

      - name: Validate bash scripts
        run: |
          for f in scripts/patronum-*.sh; do
            bash -n "$f" && echo "$f: syntax OK"
          done

      - name: Check script permissions
        run: |
          for f in scripts/patronum-*.sh; do
            test -x "$f" || (echo "$f: not executable" && exit 1)
            echo "$f: executable OK"
          done

      - name: Validate SKILL.md frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -10 "$f" | grep -q "^name:" || (echo "$f: missing name" && exit 1)
            head -10 "$f" | grep -q "^description:" || (echo "$f: missing description" && exit 1)
            echo "$f: frontmatter OK"
          done

      - name: Run self-test
        run: |
          CLAUDE_PLUGIN_ROOT="$(pwd)" bash scripts/patronum-setup.sh
          CLAUDE_PLUGIN_ROOT="$(pwd)" bash scripts/patronum-verify.sh

  validate-revelio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/revelio
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Validate SKILL.md frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -10 "$f" | grep -q "^name:" || { echo "$f: missing name"; exit 1; }
            head -10 "$f" | grep -q "^description:" || { echo "$f: missing description"; exit 1; }
            echo "$f: frontmatter OK"
          done

      - name: Run tests
        run: node --test "hooks/**/*.test.mjs"
